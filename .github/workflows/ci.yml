name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check .

      - name: Black
        run: python -m black --check src tests

      - name: Tests
        run: python -m pytest -q

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Smoke-test wheel mini-run example
        run: |
          python -m pip install --force-reinstall dist/*.whl
          tmpdir="$(mktemp -d)"
          python -m thesiskit.cli example mini-run --output "$tmpdir/mini-run"
          test -f "$tmpdir/mini-run/citations/papers.json"
          python -m thesiskit.cli citations verify \
            --input "$tmpdir/mini-run/citations/papers.json" \
            --output "$tmpdir/generated-verification-report.md" \
            --cache-dir "$tmpdir/metadata-cache" \
            --retry-attempts 2 \
            --allow-failures
          test -f "$tmpdir/generated-verification-report.md"
          python -m thesiskit.cli citations export-bibtex \
            --input "$tmpdir/mini-run/citations/papers.json" \
            --output "$tmpdir/exported-references.bib"
          test -f "$tmpdir/exported-references.bib"
          python -m thesiskit.cli citations import-bibtex \
            --input "$tmpdir/exported-references.bib" \
            --output "$tmpdir/imported-papers.json"
          test -f "$tmpdir/imported-papers.json"
